name: Build and Deploy FutDash

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * 1'  # Every Monday 06:00 UTC — pulls fresh fixture data
  workflow_dispatch:

jobs:
  # ── Step 1: Generate all JSON data from Python scripts ──────────
  generate-data:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive   # checks out open-data and xgabora-data submodules

      # Use system Python (assumes Python 3.11 is installed)
      - name: Check Python version
        run: python3 --version

      - name: Check pip version
        run: pip3 --version

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}

      - name: Install Python dependencies
        run: |
          pip3 install --upgrade pip
          pip3 install pandas numpy scikit-learn networkx matplotlib lightgbm joblib requests

      # ── StatsBomb: one JSON per match ──────────────────────────
      - name: Generate StatsBomb match JSONs
        run: |
          python3 scripts/statsbomb_v9.py \
            --base-path ./open-data/data \
            --export-json \
            --json-dir ./web/public/data/matches

      # ── Build index.json from generated match files ────────────
      - name: Generate index.json catalog
        run: |
          python3 - <<'PYEOF'
          import os, json, glob

          base = "./open-data/data"
          out  = "./web/public/data/index.json"
          os.makedirs(os.path.dirname(out), exist_ok=True)

          comp_file = os.path.join(base, "competitions.json")
          if not os.path.exists(comp_file):
              print("[WARN] competitions.json not found — writing empty index")
              json.dump({"competitions": []}, open(out, "w"))
              raise SystemExit(0)

          with open(comp_file, encoding="utf-8") as f:
              comps = json.load(f)

          index = {"competitions": []}
          seen  = {}

          for c in comps:
              cid, sid = c["competition_id"], c["season_id"]
              m_path = os.path.join(base, "matches", str(cid), f"{sid}.json")
              if not os.path.exists(m_path):
                  continue
              with open(m_path, encoding="utf-8") as f:
                  matches = json.load(f)

              match_list = []
              for m in matches:
                  jfile = f"./web/public/data/matches/{m['match_id']}.json"
                  if not os.path.exists(jfile):
                      continue
                  with open(jfile, encoding="utf-8") as f2:
                      md = json.load(f2)
                  meta = md.get("meta", {})
                  match_list.append({
                      "match_id":   meta.get("match_id"),
                      "home":       meta.get("home", ""),
                      "away":       meta.get("away", ""),
                      "score_home": meta.get("score_home", 0),
                      "score_away": meta.get("score_away", 0),
                      "date":       meta.get("date", ""),
                      "home_color": meta.get("home_color", "#6e7891"),
                      "away_color": meta.get("away_color", "#6e7891"),
                  })

              if not match_list:
                  continue
              if cid not in seen:
                  seen[cid] = {"id": cid, "name": c.get("competition_name",""),
                               "seasons": []}
                  index["competitions"].append(seen[cid])
              seen[cid]["seasons"].append({
                  "id": sid, "name": c.get("season_name",""),
                  "matches": match_list
              })

          with open(out, "w", encoding="utf-8") as f:
              json.dump(index, f, ensure_ascii=False, indent=2)
          total = sum(len(s["matches"]) for c in index["competitions"]
                      for s in c["seasons"])
          print(f"index.json → {len(index['competitions'])} competitions, {total} matches")
          PYEOF

      # ── xgabora: feature engineering ──────────────────────────
      # Uses the rewritten feature_engineering.py which handles
      # xgabora's native Matches.csv + EloRatings.csv schema.
      - name: Feature engineering (xgabora)
        run: |
          python3 scripts/feature_engineering.py \
            --matches  ./xgabora-data/Matches.csv \
            --elo      ./xgabora-data/EloRatings.csv \
            --output-dir ./scripts/features

      # ── Train LightGBM model ───────────────────────────────────
      - name: Train prediction model
        if: hashFiles('scripts/features/features_all.csv') != ''
        run: |
          python3 scripts/train_model.py \
            --features   ./scripts/features/features_all.csv \
            --output-dir ./scripts

      # ── Generate prediction JSONs ──────────────────────────────
      - name: Generate prediction JSONs
        if: hashFiles('scripts/model.joblib') != ''
        run: |
          python3 scripts/generate_predictions.py \
            --features-dir  ./scripts/features \
            --model         ./scripts/model.joblib \
            --output-dir    ./web/public/data/predictions \
            --statsbomb-base ./open-data

      # ── Fetch upcoming fixtures (optional — needs API key) ─────
      - name: Fetch upcoming fixtures
        if: ${{ secrets.FOOTBALL_DATA_API_KEY != '' }}
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: |
          python3 scripts/fetch_fixtures.py \
            --api-key      "$FOOTBALL_DATA_API_KEY" \
            --output-dir   ./web/public/data/predictions \
            --features-dir ./scripts/features \
            --model        ./scripts/model.joblib \
            --days-ahead   14
        continue-on-error: true    # don't fail the whole build if API key missing

      # ── Upload all generated data as artifact ─────────────────
      - name: Upload data artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-data
          path: web/public/data/
          retention-days: 1

  # ── Step 2: Build React + deploy to GitHub Pages ────────────────
  build-deploy:
    needs: generate-data
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Download generated data
        uses: actions/download-artifact@v4
        with:
          name: generated-data
          path: web/public/data/

      - name: Install npm dependencies
        working-directory: ./web
        run: npm ci

      - name: TypeScript type check
        working-directory: ./web
        run: npx tsc --noEmit

      - name: Build Vite app
        working-directory: ./web
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web/dist
          # cname: futdash.app   ← uncomment if you have a custom domain
