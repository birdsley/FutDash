name: Build and Deploy FutDash

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * 1'   # Every Monday 06:00 UTC
  workflow_dispatch:

jobs:
  # ── Step 1: Python data pipeline ────────────────────────────────
  generate-data:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Check Python version
        run: python3 --version

      - name: Check pip version
        run: pip3 --version

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}

      - name: Install Python dependencies
        run: |
          pip3 install --upgrade pip
          pip3 install pandas numpy scikit-learn networkx matplotlib lightgbm joblib requests

      # ── StatsBomb: one JSON per match ──────────────────────────
      - name: Generate StatsBomb match JSONs
        run: |
          python3 scripts/statsbomb_v9.py \
            --base-path ./open-data/data \
            --export-json \
            --json-dir ./web/public/data/matches

      # ── Build index.json from generated match files ────────────
      # Fixed: previous version only showed one competition because it
      # relied on meta.home_color which could be missing. Now reads
      # directly from competitions.json + matches directories.
      - name: Generate index.json catalog
        run: |
          python3 - <<'PYEOF'
          import os, json, glob

          base         = "./open-data/data"
          matches_base = "./web/public/data/matches"
          out          = "./web/public/data/index.json"
          os.makedirs(os.path.dirname(out), exist_ok=True)

          comp_file = os.path.join(base, "competitions.json")
          if not os.path.exists(comp_file):
              print("[WARN] competitions.json not found — writing empty index")
              with open(out, "w") as f:
                  json.dump({"competitions": []}, f)
              raise SystemExit(0)

          with open(comp_file, encoding="utf-8") as f:
              comps = json.load(f)

          # Flag mapping for known competitions
          COMP_FLAGS = {
              "Premier League":           "ENG",
              "La Liga":                  "ESP",
              "Bundesliga":               "GER",
              "Serie A":                  "ITA",
              "Ligue 1":                  "FRA",
              "Champions League":         "UCL",
              "FA Women's Super League":  "ENG",
              "FIFA World Cup":           "WC",
              "UEFA Euro":                "EUR",
          }

          index = {"competitions": []}
          seen  = {}

          for c in comps:
              cid = c["competition_id"]
              sid = c["season_id"]
              comp_name = c.get("competition_name", "")
              season_name = c.get("season_name", "")

              m_path = os.path.join(base, "matches", str(cid), f"{sid}.json")
              if not os.path.exists(m_path):
                  continue

              with open(m_path, encoding="utf-8") as f:
                  matches = json.load(f)

              match_list = []
              for m in matches:
                  mid = m["match_id"]
                  jfile = os.path.join(matches_base, f"{mid}.json")
                  if not os.path.exists(jfile):
                      continue
                  try:
                      with open(jfile, encoding="utf-8") as f2:
                          md = json.load(f2)
                  except Exception:
                      continue

                  meta = md.get("meta", {})

                  # Fall back to raw StatsBomb data if meta is sparse
                  home = (meta.get("home")
                          or m.get("home_team", {}).get("home_team_name", ""))
                  away = (meta.get("away")
                          or m.get("away_team", {}).get("away_team_name", ""))
                  date = (meta.get("date")
                          or m.get("match_date", ""))
                  score_home = meta.get("score_home", m.get("home_score", 0) or 0)
                  score_away = meta.get("score_away", m.get("away_score", 0) or 0)
                  home_color = meta.get("home_color", "#6e7891")
                  away_color = meta.get("away_color", "#6e7891")

                  if not home or not away:
                      continue

                  match_list.append({
                      "match_id":   mid,
                      "home":       home,
                      "away":       away,
                      "score_home": int(score_home),
                      "score_away": int(score_away),
                      "date":       date,
                      "home_color": home_color,
                      "away_color": away_color,
                  })

              if not match_list:
                  continue

              if cid not in seen:
                  seen[cid] = {
                      "id":      cid,
                      "name":    comp_name,
                      "flag":    COMP_FLAGS.get(comp_name, ""),
                      "seasons": [],
                  }
                  index["competitions"].append(seen[cid])

              seen[cid]["seasons"].append({
                  "id":      sid,
                  "name":    season_name,
                  "matches": sorted(match_list, key=lambda x: x["date"], reverse=True),
              })

          # Sort competitions alphabetically
          index["competitions"].sort(key=lambda x: x["name"])

          with open(out, "w", encoding="utf-8") as f:
              json.dump(index, f, ensure_ascii=False, indent=2)

          total = sum(
              len(s["matches"])
              for c in index["competitions"]
              for s in c["seasons"]
          )
          print(f"index.json -> {len(index['competitions'])} competitions, {total} matches")
          PYEOF

      # ── xgabora: feature engineering ──────────────────────────
      - name: Feature engineering (xgabora)
        run: |
          python3 scripts/feature_engineering.py \
            --matches    ./xgabora-data/Matches.csv \
            --elo        ./xgabora-data/EloRatings.csv \
            --output-dir ./scripts/features

      # ── Train LightGBM model ───────────────────────────────────
      # Fixed: hashFiles() only works on files present at workflow START,
      # not files generated during the run. Use a shell -f check instead.
      - name: Train prediction model
        run: |
          if [ -f "scripts/features/features_all.csv" ]; then
            echo "Features found, training model..."
            python3 scripts/train_model.py \
              --features   ./scripts/features/features_all.csv \
              --output-dir ./scripts
          else
            echo "No features_all.csv found — skipping model training"
          fi

      # ── Generate prediction JSONs ──────────────────────────────
      # Fixed: same hashFiles() issue. Use shell check instead.
      - name: Generate prediction JSONs
        run: |
          if [ -f "scripts/model.joblib" ]; then
            echo "Model found, generating predictions..."
            python3 scripts/generate_predictions.py \
              --features-dir   ./scripts/features \
              --model          ./scripts/model.joblib \
              --output-dir     ./web/public/data/predictions \
              --statsbomb-base ./open-data
          else
            echo "No model.joblib found — skipping prediction generation"
          fi

      # ── Fetch upcoming fixtures ────────────────────────────────
      - name: Fetch upcoming fixtures
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: |
          if [ -n "$FOOTBALL_DATA_API_KEY" ]; then
            python3 scripts/fetch_fixtures.py \
              --api-key      "$FOOTBALL_DATA_API_KEY" \
              --output-dir   ./web/public/data/predictions \
              --features-dir ./scripts/features \
              --model        ./scripts/model.joblib \
              --days-ahead   14
          else
            echo "FOOTBALL_DATA_API_KEY not set — skipping fixture fetch"
          fi
        continue-on-error: true

      # ── Upload generated data as artifact ─────────────────────
      - name: Upload data artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-data
          path: web/public/data/
          retention-days: 1

  # ── Step 2: Build React + deploy to GitHub Pages ────────────────
  build-deploy:
    needs: generate-data
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download generated data
        uses: actions/download-artifact@v4
        with:
          name: generated-data
          path: web/public/data/

      - name: Install npm dependencies
        working-directory: ./web
        run: npm ci

      - name: TypeScript type check
        working-directory: ./web
        run: npx tsc --noEmit

      - name: Build Vite app
        working-directory: ./web
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web/dist
          # cname: futdash.app
