name: Build and Deploy FutDash

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * 1'  # Every Monday 06:00 UTC — pulls fresh xgabora data
  workflow_dispatch:

jobs:
  generate-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive  # StatsBomb open-data as submodule

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: |
          pip install pandas numpy scikit-learn networkx matplotlib

      - name: Generate all match JSON files
        run: |
          python statsbomb_v9.py \
            --base-path ./open-data/data \
            --export-json \
            --output-dir ./futdash/public/data/matches/ \
            --generate-index ./futdash/public/data/index.json

  build-deploy:
    needs: generate-data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: futdash/package-lock.json

      - name: Install and build
        working-directory: ./futdash
        run: |
          npm ci
          npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./futdash/dist
          cname: futdash.app  # optional custom domain
