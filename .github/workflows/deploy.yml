name: Build and Deploy FutDash

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * 1'   # Every Monday 06:00 UTC
  workflow_dispatch:

jobs:
  # ── Step 1: Python data pipeline ────────────────────────────────
  generate-data:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Check Python version
        run: python3 --version

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-v2-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-v2-

      - name: Install Python dependencies
        run: |
          pip3 install --upgrade pip
          pip3 install pandas numpy scikit-learn networkx matplotlib lightgbm joblib requests

      # ── Create output directories ──────────────────────────────
      - name: Create output directories
        run: |
          mkdir -p ./web/public/data/matches
          mkdir -p ./web/public/data/predictions

      # ── Export ALL StatsBomb matches to JSON ───────────────────
      # Uses export_all_matches.py which loops every competition/season/match
      # and calls export_match_json() from statsbomb_v9.py for each one.
      # Skips already-exported files (idempotent) so incremental runs are fast.
      - name: Export all StatsBomb matches to JSON
        run: |
          python3 scripts/export_all_matches.py \
            --base-path ./open-data/data \
            --output-dir ./web/public/data/matches \
            --index-out  ./web/public/data/index.json
        timeout-minutes: 60

      # ── Verify output ─────────────────────────────────────────
      - name: Verify data output
        run: |
          echo "=== Match JSON files ==="
          ls ./web/public/data/matches/ | wc -l
          echo "files in matches/"
          echo "=== index.json ==="
          python3 -c "
          import json
          with open('./web/public/data/index.json') as f:
              idx = json.load(f)
          comps = idx.get('competitions', [])
          total = sum(len(s['matches']) for c in comps for s in c['seasons'])
          print(f'{len(comps)} competitions, {total} matches in index')
          "

      # ── xgabora: feature engineering ──────────────────────────
      - name: Feature engineering (xgabora)
        run: |
          if [ -f "xgabora-data/Matches.csv" ]; then
            python3 scripts/feature_engineering.py \
              --matches    ./xgabora-data/Matches.csv \
              --elo        ./xgabora-data/EloRatings.csv \
              --output-dir ./scripts/features
          else
            echo "xgabora data not found — skipping feature engineering"
            mkdir -p ./scripts/features
          fi
        continue-on-error: true

      # ── Train LightGBM model ───────────────────────────────────
      - name: Train prediction model
        run: |
          if [ -f "scripts/features/features_all.csv" ]; then
            echo "Features found, training model..."
            python3 scripts/train_model.py \
              --features   ./scripts/features/features_all.csv \
              --output-dir ./scripts
          else
            echo "No features_all.csv found — skipping model training"
          fi
        continue-on-error: true

      # ── Generate prediction JSONs ──────────────────────────────
      - name: Generate prediction JSONs
        run: |
          if [ -f "scripts/model.joblib" ]; then
            echo "Model found, generating predictions..."
            python3 scripts/generate_predictions.py \
              --features-dir   ./scripts/features \
              --model          ./scripts/model.joblib \
              --output-dir     ./web/public/data/predictions \
              --statsbomb-base ./open-data
          else
            echo "No model.joblib found — skipping prediction generation"
          fi
        continue-on-error: true

      # ── Fetch upcoming fixtures ────────────────────────────────
      - name: Fetch upcoming fixtures
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: |
          if [ -n "$FOOTBALL_DATA_API_KEY" ]; then
            python3 scripts/fetch_fixtures.py \
              --api-key      "$FOOTBALL_DATA_API_KEY" \
              --output-dir   ./web/public/data/predictions \
              --features-dir ./scripts/features \
              --model        ./scripts/model.joblib \
              --days-ahead   14
          else
            echo "FOOTBALL_DATA_API_KEY not set — skipping fixture fetch"
          fi
        continue-on-error: true

      # ── Upload generated data as artifact ─────────────────────
      - name: Upload data artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-data
          path: web/public/data/
          retention-days: 1

  # ── Step 2: Build React + deploy to GitHub Pages ────────────────
  build-deploy:
    needs: generate-data
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download generated data
        uses: actions/download-artifact@v4
        with:
          name: generated-data
          path: web/public/data/

      - name: Verify downloaded data
        run: |
          echo "=== Downloaded data ==="
          find web/public/data -name "*.json" | wc -l
          echo "JSON files downloaded"
          if [ -f "web/public/data/index.json" ]; then
            echo "✓ index.json present"
            cat web/public/data/index.json | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          comps=d.get('competitions',[])
          total=sum(len(s['matches']) for c in comps for s in c['seasons'])
          print(f'  {len(comps)} competitions, {total} matches')
            "
          else
            echo "✗ index.json MISSING — creating empty placeholder"
            mkdir -p web/public/data
            echo '{"competitions":[]}' > web/public/data/index.json
          fi

      - name: Install npm dependencies
        working-directory: ./web
        run: npm ci

      - name: TypeScript type check
        working-directory: ./web
        run: npx tsc --noEmit
        # If this fails, show all errors clearly
        continue-on-error: false

      - name: Build Vite app
        working-directory: ./web
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web/dist
          # cname: futdash.app
